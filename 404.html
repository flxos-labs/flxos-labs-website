<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | FlxOS</title>
    <meta name="description" content="The page you're looking for doesn't exist. Navigate back to FlxOS.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50' y='70' font-family='sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>F</text></svg>">

    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-content {
            max-width: 560px;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.04em;
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-highlight);
        }

        .error-description {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .error-terminal {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: left;
            margin-bottom: 40px;
            color: #e6edf3;
        }

        .error-terminal .prompt {
            color: var(--secondary);
        }

        .error-terminal .error-msg {
            color: #f87171;
        }

        .error-terminal .suggestion {
            color: #4ade80;
        }

        .error-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .glitch-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }
    </style>
</head>

<body>
    <div class="glitch-bg"></div>

    <nav class="navbar scrolled" role="navigation" aria-label="Main navigation">
        <div class="container nav-container">
            <a href="/" class="logo">
                <div class="logo-icon"></div>
                <span>FlxOS</span>
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/docs">Docs</a>
                <a href="/about">About</a>
                <a href="https://github.com/flxos-labs/flxos" target="_blank" rel="noopener noreferrer" class="github-link">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </div>
    </nav>

    <main class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                Looks like this page got lost in the build process. The route you're looking for doesn't exist.
            </p>
            <div class="error-terminal">
                <div><span class="prompt">$</span> flxos navigate --to <span id="lost-path"></span></div>
                <div class="error-msg">Error: Route not found in profile.</div>
                <div class="suggestion">Suggestion: try navigating to / instead.</div>
            </div>
            <div class="error-buttons">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    <span>Go Home</span>
                </a>
                <a href="/docs" class="btn btn-secondary">
                    <i class="fas fa-book"></i>
                    <span>Read Docs</span>
                </a>
                <a href="https://github.com/flxos-labs/flxos/issues" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
                    <i class="fas fa-bug"></i>
                    <span>Report Issue</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        // Show the current path in the terminal mock
        const pathEl = document.getElementById('lost-path');
        if (pathEl) {
            pathEl.textContent = window.location.pathname;
        }

        // Theme handling
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        const currentTheme = localStorage.getItem('theme') || (prefersDark.matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</body>

</html>
